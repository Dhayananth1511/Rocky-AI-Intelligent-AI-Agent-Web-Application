<!DOCTYPE html>
<html data-theme="dark">
<head>
    <title>Rocky AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">

    <style>
        /* ─── Theme Tokens ─────────────────────────────────────────── */
        :root {
            --transition: 0.25s ease;
        }

        [data-theme="dark"] {
            --bg-base:      #0f1117;
            --bg-surface:   #181b24;
            --bg-header:    #13151e;
            --bg-input:     #1e2130;
            --bg-user:      #10a37f;
            --bg-bot:       #1e2130;
            --border:       rgba(255,255,255,0.07);
            --text-primary: #e8eaf0;
            --text-muted:   #6b7280;
            --accent:       #10a37f;
            --accent-hover: #0e8c6d;
            --scrollbar:    #2e3347;
            --shadow:       0 8px 32px rgba(0,0,0,0.4);
            --glow:         0 0 20px rgba(16,163,127,0.15);
        }

        [data-theme="light"] {
            --bg-base:      #f3f4f8;
            --bg-surface:   #ffffff;
            --bg-header:    #ffffff;
            --bg-input:     #ffffff;
            --bg-user:      #10a37f;
            --bg-bot:       #ffffff;
            --border:       rgba(0,0,0,0.08);
            --text-primary: #1a1d27;
            --text-muted:   #9ca3af;
            --accent:       #10a37f;
            --accent-hover: #0e8c6d;
            --scrollbar:    #d1d5db;
            --shadow:       0 4px 20px rgba(0,0,0,0.08);
            --glow:         0 0 20px rgba(16,163,127,0.08);
        }

        /* ─── Reset & Base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-base);
            font-family: 'Sora', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
        }

        /* ─── Header ────────────────────────────────────────────────── */
        .header {
            height: 62px;
            background: var(--bg-header);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 100;
            transition: background var(--transition), border-color var(--transition);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #10a37f, #0e8c6d);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: var(--glow);
        }

        .logo-text {
            color: var(--text-primary);
            transition: color var(--transition);
        }

        .logo-badge {
            font-size: 10px;
            font-weight: 500;
            background: rgba(16,163,127,0.12);
            color: var(--accent);
            border: 1px solid rgba(16,163,127,0.25);
            padding: 2px 7px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ─── Theme Toggle ──────────────────────────────────────────── */
        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition);
        }

        .theme-toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            color: var(--text-muted);
        }

        .theme-toggle-btn.active {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(16,163,127,0.4);
        }

        /* ─── Chat Container ────────────────────────────────────────── */
        .chat-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        /* Welcome state */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            padding: 40px 20px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.2s;
        }

        .welcome-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #10a37f22, #10a37f44);
            border: 1px solid rgba(16,163,127,0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 4px;
        }

        .welcome h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            transition: color var(--transition);
        }

        .welcome p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
            max-width: 300px;
            line-height: 1.6;
            transition: color var(--transition);
        }

        /* ─── Messages ──────────────────────────────────────────────── */
        .message-row {
            display: flex;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            animation: fadeUp 0.28s ease-out;
        }

        .user-row { justify-content: flex-end; }
        .bot-row  { justify-content: flex-start; gap: 10px; align-items: flex-end; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10a37f, #0e8c6d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: var(--glow);
        }

        .message {
            max-width: 680px;
            padding: 13px 17px;
            border-radius: 14px;
            font-size: 14.5px;
            line-height: 1.65;
            word-break: break-word;
            transition: background var(--transition);
        }

        .user {
            background: var(--bg-user);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: var(--bg-bot);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }

        .message p { margin: 0 0 8px; }
        .message p:last-child { margin-bottom: 0; }
        .message code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(16,163,127,0.12);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .message pre {
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
        }
        [data-theme="light"] .message pre {
            background: rgba(0,0,0,0.05);
        }
        .message pre code {
            background: none;
            padding: 0;
        }

        /* Typing indicator */
        .typing-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.1s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ─── Input Area ────────────────────────────────────────────── */
        .input-area {
            padding: 14px 20px 18px;
            background: var(--bg-base);
            transition: background var(--transition);
        }

        .input-box {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-input);
            border-radius: 14px;
            padding: 10px 8px 10px 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: background var(--transition), border-color var(--transition), box-shadow 0.2s;
        }

        .input-box:focus-within {
            border-color: rgba(16,163,127,0.45);
            box-shadow: var(--glow), var(--shadow);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            font-size: 14.5px;
            transition: color var(--transition);
            resize: none;
            overflow-y: auto;
            line-height: 1.55;
            max-height: 160px;
            min-height: 24px;
            height: 24px;
            padding: 0;
            display: block;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar) transparent;
        }

        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

        ::placeholder { color: var(--text-muted); }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover  { background: var(--accent-hover); transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg { width: 17px; height: 17px; }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            transition: color var(--transition);
        }

        /* ─── Scrollbar ─────────────────────────────────────────────── */
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

        /* ─── Animations ────────────────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Mobile ────────────────────────────────────────────────── */
        @media (max-width: 640px) {
            .header    { padding: 0 16px; height: 58px; }
            .logo-badge { display: none; }
            .chat-container { padding: 20px 12px 12px; }
            .message   { font-size: 14px; max-width: 92%; }
            .input-area { padding: 10px 12px 14px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        <div class="logo-icon">🤖</div>
        <span class="logo-text">Rocky AI</span>
        <span class="logo-badge">Beta</span>
    </div>

    <div class="theme-toggle" onclick="cycleTheme()" title="Toggle theme">
        <button class="theme-toggle-btn" id="btn-dark"  title="Dark">🌙</button>
        <button class="theme-toggle-btn" id="btn-light" title="Light">☀️</button>
    </div>
</div>

<!-- Chat -->
<div class="chat-wrapper">
    <div id="chatbox" class="chat-container">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">🤖</div>
            <h2>Hey, I'm Rocky</h2>
            <p>Ask me anything — I'm here to help you think, create, and explore.</p>
        </div>
    </div>
</div>

<!-- Input -->
<div class="input-area">
    <div class="input-box">
        <textarea id="userInput"
                  placeholder="Message Rocky..."
                  rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
    <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
    /* ── Theme ── */
    const themes = ['dark', 'light'];
    let currentTheme = localStorage.getItem('rocky-theme') || 'dark';

    function applyTheme(t) {
        currentTheme = t;
        document.documentElement.setAttribute('data-theme', t);
        document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
        document.getElementById('btn-light').classList.toggle('active', t === 'light');
        localStorage.setItem('rocky-theme', t);
    }

    function cycleTheme() {
        const next = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
        applyTheme(next);
    }

    // Direct button clicks
    document.getElementById('btn-dark').addEventListener('click', e => { e.stopPropagation(); applyTheme('dark'); });
    document.getElementById('btn-light').addEventListener('click', e => { e.stopPropagation(); applyTheme('light'); });

    applyTheme(currentTheme);

    /* ── Textarea auto-resize ── */
    const textarea = document.getElementById('userInput');

    textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    textarea.addEventListener('input', function() {
        this.style.height = '24px';
        this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    });

    /* ── Chat ── */
    async function sendMessage() {
        const input   = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatbox = document.getElementById('chatbox');
        const message = input.value.trim();
        if (!message) return;

        // Hide welcome
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        // User bubble — preserve line breaks
        chatbox.insertAdjacentHTML('beforeend', `
            <div class="message-row user-row">
                <div class="message user">${escHtml(message).replace(/\n/g, '<br>')}</div>
            </div>
        `);
        scroll();

        input.value = '';
        input.style.height = '24px';
        input.disabled = true;
        sendBtn.disabled = true;

        // Typing indicator
        chatbox.insertAdjacentHTML('beforeend', `
            <div class="message-row bot-row" id="typing">
                <div class="avatar">🤖</div>
                <div class="message bot" style="padding:14px 18px">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            </div>
        `);
        scroll();

        try {
            const res  = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            document.getElementById('typing')?.remove();

            if (!res.ok) throw new Error(data.error || `Error ${res.status}`);

            chatbox.insertAdjacentHTML('beforeend', `
                <div class="message-row bot-row">
                    <div class="avatar">🤖</div>
                    <div class="message bot">${marked.parse(data.reply)}</div>
                </div>
            `);
        } catch (err) {
            document.getElementById('typing')?.remove();
            chatbox.insertAdjacentHTML('beforeend', `
                <div class="message-row bot-row">
                    <div class="avatar">⚠️</div>
                    <div class="message bot" style="color:#f87171">${escHtml(err.message)}</div>
                </div>
            `);
        } finally {
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
            scroll();
        }
    }

    function scroll() {
        const chatbox = document.getElementById('chatbox');
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
