<!DOCTYPE html>
<html data-theme="dark">
<head>
    <title>Rocky AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">

    <style>
        /* ─── Theme Tokens ─────────────────────────────────────────── */
        :root {
            --transition: 0.25s ease;
        }

        [data-theme="dark"] {
            --bg-base:      #0f1117;
            --bg-surface:   #181b24;
            --bg-header:    #13151e;
            --bg-input:     #1e2130;
            --bg-user:      #10a37f;
            --bg-bot:       #1e2130;
            --border:       rgba(255,255,255,0.07);
            --text-primary: #e8eaf0;
            --text-muted:   #6b7280;
            --accent:       #10a37f;
            --accent-hover: #0e8c6d;
            --scrollbar:    #2e3347;
            --shadow:       0 8px 32px rgba(0,0,0,0.4);
            --glow:         0 0 20px rgba(16,163,127,0.15);
            --code-bg:      #0d0f18;
            --code-header:  #161926;
        }

        [data-theme="light"] {
            --bg-base:      #f3f4f8;
            --bg-surface:   #ffffff;
            --bg-header:    #ffffff;
            --bg-input:     #ffffff;
            --bg-user:      #10a37f;
            --bg-bot:       #ffffff;
            --border:       rgba(0,0,0,0.08);
            --text-primary: #1a1d27;
            --text-muted:   #9ca3af;
            --accent:       #10a37f;
            --accent-hover: #0e8c6d;
            --scrollbar:    #d1d5db;
            --shadow:       0 4px 20px rgba(0,0,0,0.08);
            --glow:         0 0 20px rgba(16,163,127,0.08);
            --code-bg:      #1a1d2e;
            --code-header:  #22263a;
        }

        /* ─── Reset & Base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-base);
            font-family: 'Sora', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
        }

        /* ─── Header ────────────────────────────────────────────────── */
        .header {
            height: 62px;
            background: var(--bg-header);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 100;
            transition: background var(--transition), border-color var(--transition);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #10a37f, #0e8c6d);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: var(--glow);
        }

        .logo-text {
            color: var(--text-primary);
            transition: color var(--transition);
        }

        .logo-badge {
            font-size: 10px;
            font-weight: 500;
            background: rgba(16,163,127,0.12);
            color: var(--accent);
            border: 1px solid rgba(16,163,127,0.25);
            padding: 2px 7px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ─── Theme Toggle ──────────────────────────────────────────── */
        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: background var(--transition), border-color var(--transition);
        }

        .theme-toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            color: var(--text-muted);
        }

        .theme-toggle-btn.active {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(16,163,127,0.4);
        }

        /* ─── Chat Container ────────────────────────────────────────── */
        .chat-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        /* Welcome state */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            padding: 40px 20px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.2s;
        }

        .welcome-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #10a37f22, #10a37f44);
            border: 1px solid rgba(16,163,127,0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 4px;
        }

        .welcome h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            transition: color var(--transition);
        }

        .welcome p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
            max-width: 300px;
            line-height: 1.6;
            transition: color var(--transition);
        }

        /* ─── Messages ──────────────────────────────────────────────── */
        .message-row {
            display: flex;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            animation: fadeUp 0.28s ease-out;
        }

        .user-row { justify-content: flex-end; }
        .bot-row  { justify-content: flex-start; gap: 10px; align-items: flex-end; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10a37f, #0e8c6d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: var(--glow);
        }

        /* ─── Bot message wrapper (positions copy-response btn) ─────── */
        .bot-message-wrap {
            position: relative;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .message {
            padding: 13px 17px;
            border-radius: 14px;
            font-size: 14.5px;
            line-height: 1.65;
            word-break: break-word;
            transition: background var(--transition);
        }

        .user {
            background: var(--bg-user);
            color: #fff;
            border-bottom-right-radius: 4px;
            max-width: 680px;
        }

        .bot {
            background: var(--bg-bot);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }

        .message p { margin: 0 0 8px; }
        .message p:last-child { margin-bottom: 0; }
        .message code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(16,163,127,0.12);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        /* ─── Code Block (pre) ──────────────────────────────────────── */
        .message pre {
            position: relative;
            background: var(--code-bg);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.06);
        }

        [data-theme="light"] .message pre {
            border-color: rgba(0,0,0,0.1);
        }

        /* language label + copy button header bar */
        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--code-header);
            padding: 7px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .code-lang {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: lowercase;
            letter-spacing: 0.3px;
        }

        /* ─── User message wrapper ──────────────────────────────────── */
        .user-message-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
            max-width: 680px;
        }

        .user-copy-bar {
            justify-content: flex-end;
        }

        .user-copy-bar .copy-btn {
            color: var(--text-muted);
        }

        .user-copy-bar .copy-btn:hover {
            color: var(--accent);
            background: rgba(16,163,127,0.08);
            border-color: rgba(16,163,127,0.2);
        }


        .copy-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Sora', sans-serif;
            font-size: 11.5px;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 3px 8px;
            cursor: pointer;
            transition: color 0.18s, background 0.18s, border-color 0.18s, transform 0.15s;
            white-space: nowrap;
            line-height: 1;
        }

        .copy-btn svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
            transition: opacity 0.18s;
        }

        .copy-btn:hover {
            color: var(--accent);
            background: rgba(16,163,127,0.08);
            border-color: rgba(16,163,127,0.2);
        }

        .copy-btn:active { transform: scale(0.95); }

        .copy-btn.copied {
            color: var(--accent);
            background: rgba(16,163,127,0.12);
            border-color: rgba(16,163,127,0.3);
        }

        /* ─── Code block inner scroll area ─────────────────────────── */
        .message pre code {
            display: block;
            background: none;
            padding: 14px 16px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            color: #c9d1d9;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar) transparent;
        }

        [data-theme="light"] .message pre code {
            color: #cdd9e5;
        }

        .message pre code::-webkit-scrollbar { height: 4px; }
        .message pre code::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

        /* ─── Copy Response Button (bottom of bot message) ─────────── */
        .copy-response-bar {
            display: flex;
            justify-content: flex-end;
            padding: 4px 4px 0;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bot-message-wrap:hover .copy-response-bar,
        .user-message-wrap:hover .copy-response-bar { opacity: 1; }

        .copy-response-btn {
            font-size: 11.5px;
            padding: 4px 10px;
        }

        /* Typing indicator */
        .typing-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.1s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ─── Input Area ────────────────────────────────────────────── */
        .input-area {
            padding: 14px 20px 18px;
            background: var(--bg-base);
            transition: background var(--transition);
        }

        .input-box {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--bg-input);
            border-radius: 14px;
            padding: 10px 8px 10px 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: background var(--transition), border-color var(--transition), box-shadow 0.2s;
        }

        .input-box:focus-within {
            border-color: rgba(16,163,127,0.45);
            box-shadow: var(--glow), var(--shadow);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            font-size: 14.5px;
            transition: color var(--transition);
            resize: none;
            overflow-y: auto;
            line-height: 1.55;
            max-height: 160px;
            min-height: 24px;
            height: 24px;
            padding: 0;
            display: block;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar) transparent;
        }

        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

        ::placeholder { color: var(--text-muted); }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover  { background: var(--accent-hover); transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg { width: 17px; height: 17px; }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            transition: color var(--transition);
        }

        /* ─── Scrollbar ─────────────────────────────────────────────── */
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }

        /* ─── Animations ────────────────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Mobile ────────────────────────────────────────────────── */
        @media (max-width: 640px) {
            .header    { padding: 0 16px; height: 58px; }
            .logo-badge { display: none; }
            .chat-container { padding: 20px 12px 12px; }
            .message   { font-size: 14px; }
            .bot-message-wrap { max-width: 92%; }
            .user      { max-width: 92%; }
            .input-area { padding: 10px 12px 14px; }
            /* Always show copy bars on mobile (no hover) */
            .copy-response-bar { opacity: 1; }
            .user-message-wrap { max-width: 92%; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        <div class="logo-icon">🤖</div>
        <span class="logo-text">Rocky AI</span>
        <span class="logo-badge">Beta</span>
    </div>

    <div class="theme-toggle" onclick="cycleTheme()" title="Toggle theme">
        <button class="theme-toggle-btn" id="btn-dark"  title="Dark">🌙</button>
        <button class="theme-toggle-btn" id="btn-light" title="Light">☀️</button>
    </div>
</div>

<!-- Chat -->
<div class="chat-wrapper">
    <div id="chatbox" class="chat-container">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">🤖</div>
            <h2>Hey, I'm Rocky</h2>
            <p>Ask me anything — I'm here to help you think, create, and explore.</p>
        </div>
    </div>
</div>

<!-- Input -->
<div class="input-area">
    <div class="input-box">
        <textarea id="userInput"
                  placeholder="Message Rocky..."
                  rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
    <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
    /* ── SVG Icons ── */
    const ICON_COPY = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>`;
    const ICON_CHECK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
    </svg>`;

    /* ── Theme ── */
    const themes = ['dark', 'light'];
    let currentTheme = localStorage.getItem('rocky-theme') || 'dark';

    function applyTheme(t) {
        currentTheme = t;
        document.documentElement.setAttribute('data-theme', t);
        document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
        document.getElementById('btn-light').classList.toggle('active', t === 'light');
        localStorage.setItem('rocky-theme', t);
    }

    function cycleTheme() {
        const next = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
        applyTheme(next);
    }

    document.getElementById('btn-dark').addEventListener('click', e => { e.stopPropagation(); applyTheme('dark'); });
    document.getElementById('btn-light').addEventListener('click', e => { e.stopPropagation(); applyTheme('light'); });

    applyTheme(currentTheme);

    /* ── Textarea auto-resize ── */
    const textarea = document.getElementById('userInput');

    textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    textarea.addEventListener('input', function() {
        this.style.height = '24px';
        this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    });

    /* ── Copy helper ── */
    function triggerCopy(btn, text, resetLabel) {
        /* resetLabel: what to show after 2s (defaults to "Copy") */
        const label = resetLabel || 'Copy';

        function markCopied() {
            btn.innerHTML = `${ICON_CHECK} Copied!`;
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerHTML = `${ICON_COPY} ${label}`;
                btn.classList.remove('copied');
            }, 2000);
        }

        function fallbackCopy() {
            /* Must be visible & in DOM for select() to work */
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01;border:none;outline:none;pointer-events:none;';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand('copy');
                markCopied();
            } catch (e) {
                /* Last resort: nothing we can do silently */
                console.warn('Copy failed:', e);
            }
            document.body.removeChild(ta);
        }

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(markCopied).catch(fallbackCopy);
        } else {
            fallbackCopy();
        }
    }

    /* ── Inject copy buttons into all <pre> blocks inside an element ── */
    function enhanceCodeBlocks(container) {
        container.querySelectorAll('pre').forEach(pre => {
            if (pre.querySelector('.code-header')) return; // already enhanced

            const code = pre.querySelector('code');
            if (!code) return;

            /* Detect language from class e.g. "language-python" */
            const langClass = [...(code.classList)].find(c => c.startsWith('language-'));
            const lang = langClass ? langClass.replace('language-', '') : 'code';

            /* Build header bar */
            const header = document.createElement('div');
            header.className = 'code-header';

            const langLabel = document.createElement('span');
            langLabel.className = 'code-lang';
            langLabel.textContent = lang;

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = `${ICON_COPY} Copy`;
            copyBtn.setAttribute('title', 'Copy code');
            copyBtn.addEventListener('click', () => {
                triggerCopy(copyBtn, code.innerText, 'Copy');
            });

            header.appendChild(langLabel);
            header.appendChild(copyBtn);
            pre.insertBefore(header, pre.firstChild);
        });
    }

    /* ── Chat ── */
    async function sendMessage() {
        const input   = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatbox = document.getElementById('chatbox');
        const message = input.value.trim();
        if (!message) return;

        /* Hide welcome */
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        /* User bubble */
        const userRow = document.createElement('div');
        userRow.className = 'message-row user-row';

        const userWrap = document.createElement('div');
        userWrap.className = 'user-message-wrap';

        const userMsg = document.createElement('div');
        userMsg.className = 'message user';
        userMsg.innerHTML = escHtml(message).replace(/\n/g, '<br>');

        const userCopyBar = document.createElement('div');
        userCopyBar.className = 'copy-response-bar user-copy-bar';

        const userCopyBtn = document.createElement('button');
        userCopyBtn.className = 'copy-btn copy-response-btn';
        userCopyBtn.innerHTML = `${ICON_COPY} Copy`;
        userCopyBtn.title = 'Copy message';
        userCopyBtn.addEventListener('click', () => {
            triggerCopy(userCopyBtn, userMsg.innerText, 'Copy');
        });

        userCopyBar.appendChild(userCopyBtn);
        userWrap.appendChild(userCopyBar);
        userWrap.appendChild(userMsg);
        userRow.appendChild(userWrap);
        chatbox.appendChild(userRow);
        scroll();

        input.value = '';
        input.style.height = '24px';
        input.disabled = true;
        sendBtn.disabled = true;

        /* Typing indicator */
        chatbox.insertAdjacentHTML('beforeend', `
            <div class="message-row bot-row" id="typing">
                <div class="avatar">🤖</div>
                <div class="message bot" style="padding:14px 18px">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            </div>
        `);
        scroll();

        try {
            const res  = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            document.getElementById('typing')?.remove();

            if (!res.ok) throw new Error(data.error || `Error ${res.status}`);

            /* Build bot message wrapper */
            const row = document.createElement('div');
            row.className = 'message-row bot-row';

            const avatarEl = document.createElement('div');
            avatarEl.className = 'avatar';
            avatarEl.textContent = '🤖';

            const wrap = document.createElement('div');
            wrap.className = 'bot-message-wrap';

            const msgEl = document.createElement('div');
            msgEl.className = 'message bot';
            msgEl.innerHTML = marked.parse(data.reply);

            /* Copy-response button bar */
            const copyBar = document.createElement('div');
            copyBar.className = 'copy-response-bar';

            const copyRespBtn = document.createElement('button');
            copyRespBtn.className = 'copy-btn copy-response-btn';
            copyRespBtn.innerHTML = `${ICON_COPY} Copy response`;
            copyRespBtn.title = 'Copy full response';
            copyRespBtn.addEventListener('click', () => {
                triggerCopy(copyRespBtn, msgEl.innerText, 'Copy response');
            });

            copyBar.appendChild(copyRespBtn);
            wrap.appendChild(msgEl);
            wrap.appendChild(copyBar);
            row.appendChild(avatarEl);
            row.appendChild(wrap);
            chatbox.appendChild(row);

            /* Enhance code blocks inside this message */
            enhanceCodeBlocks(msgEl);

        } catch (err) {
            document.getElementById('typing')?.remove();
            chatbox.insertAdjacentHTML('beforeend', `
                <div class="message-row bot-row">
                    <div class="avatar">⚠️</div>
                    <div class="message bot" style="color:#f87171">${escHtml(err.message)}</div>
                </div>
            `);
        } finally {
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
            scroll();
        }
    }

    function scroll() {
        const chatbox = document.getElementById('chatbox');
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
